# ============================================================
# docker-compose.yml — user-service dev environment
# ============================================================
#
# Cách dùng:
#   docker compose up --build          # Khởi user-service + Keycloak local
#   docker compose up --build -d       # Chạy nền
#   docker compose logs -f user-service # Xem log
#   docker compose down -v             # Dừng + xóa volume
#
# Bao gồm:
#   - user-service (dev target, hot reload qua bind mount)
#   - keycloak (optional — comment out nếu đã có Keycloak khác)
#
# Lưu ý: Keycloak local KHÔNG có F5/WAF trước, nên dùng
# KEYCLOAK_INTERNAL_URL=http://keycloak:8080 (service-to-service trong compose network)
# ============================================================

services:
  user-service:
    container_name: user-service-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev          # ← dùng dev stage (hot reload)
    ports:
      - "8300:8300"
    environment:
      # ── Server ──
      - HOST=0.0.0.0
      - PORT=8300
      - LOG_LEVEL=debug
      - NODE_ENV=development

      # ── Keycloak (compose service name) ──
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - KEYCLOAK_REALM=agribank
      # Client + secret này tạo trong Keycloak realm agribank (xem bước setup dưới README)
      - KEYCLOAK_CLIENT_ID=ocr-banca-service
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-dev-secret-change-me}
      - KEYCLOAK_VERIFY_SSL=false

      # ── Auth ──
      # Set qua .env hoặc override ở đây. Mặc định = dev token.
      - SERVICE_API_KEY=${SERVICE_API_KEY:-dev-service-token-123}

      # ── Default client chứa role ──
      - ROLES_CLIENT_ID=banca-app
    volumes:
      # Bind-mount source để hot reload
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      # Anonymous volume để node_modules không bị ghi đè bởi bind mount
      - node_modules:/app/node_modules
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  # ── Keycloak local (optional) ──
  # Comment out block này nếu đã có Keycloak ở env khác.
  # Sau đó đổi KEYCLOAK_INTERNAL_URL sang URL thật.
  keycloak:
    container_name: keycloak-dev
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
    ports:
      - "8080:8080"     # Expose để truy cập admin console: http://localhost:8080
    volumes:
      - keycloak-data:/opt/keycloak/data
      # Realm import tự động khi first boot
      - ./dev-realm:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  node_modules:
  keycloak-data: